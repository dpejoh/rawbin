[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/paste"
  to = "/.netlify/functions/raw"
  status = 200

[[redirects]]
  from = "/clipboard"
  to = "/.netlify/functions/clipboards"
  status = 200

[[redirects]]
  from = "/clipboard/*"
  to = "/.netlify/functions/clipboards/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
