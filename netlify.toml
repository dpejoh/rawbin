[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  environment = { VITE_R2_WORKER_URL = "https://rawbin.dpejoh.com" }

[[redirects]]
from = "/key/catalog"
to = "/.netlify/functions/catalog"
  status = 200

[[redirects]]
  from = "/key"
  to = "/.netlify/functions/raw"
  status = 200

[[redirects]]
  from = "/key/*"
  to = "/.netlify/functions/raw/:splat"
  status = 200

[[redirects]]
  from = "/clips"
  to = "/.netlify/functions/clipboards"
  status = 200

[[redirects]]
  from = "/clips/*"
  to = "/.netlify/functions/clipboards/:splat"
  status = 200

[[redirects]]
from = "/file"
to = "/.netlify/functions/files"
status = 200

[[redirects]]
from = "/file/*"
to = "/.netlify/functions/files/:splat"
status = 200

[[redirects]]
from = "/apps"
to = "/.netlify/functions/apps"
status = 200

[[redirects]]
from = "/apps/*"
to = "/.netlify/functions/apps/:splat"
status = 200

[[redirects]]
from = "/mod"
to = "/.netlify/functions/modules"
status = 200

[[redirects]]
from = "/mod/*"
to = "/.netlify/functions/modules/:splat"
status = 200

[[redirects]]
from = "/apk"
to = "/.netlify/functions/apks"
status = 200

[[redirects]]
from = "/apk/*"
to = "/.netlify/functions/apks/:splat"
status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-eval'; connect-src 'self' https://rawbin.dpejoh.com; frame-src 'none'; object-src 'none'"
